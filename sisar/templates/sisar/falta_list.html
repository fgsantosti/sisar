{% extends 'sisar/base.html' %}

{% block content %}

<h1>Faltas por Professores</h1>

<table class="table">
	<tbody>
	{% for falta in object_list %}
		<tr>
	      <td>{{falta.professor.nome}}</td>
	      <td><a href="{% url 'professor_update' falta.id %}" class="btn btn-info">Atualizar</a></td>
	      <td><a href="{% url 'professor_delete' falta.id %}" class="btn btn-danger">Deletar</a></td>
	    </tr>
	{% endfor %}
  	</tbody>
</table>




{% endblock %}
