{% extends 'sisar/base.html' %}

{% block content %}

<h1>Turmas</h1>

<table class="table">
	<tbody>
	{% for turma in object_list %}
		<tr>
	      <td>{{turma.nome}}</td>
	      <td><a href="{% url 'turma_update' turma.id %}" class="btn btn-info">Atualizar</a></td>
	      <td><a href="{% url 'turma_delete' turma.id %}" class="btn btn-danger">Deletar</a></td>
	    </tr>
	{% endfor %}
  	</tbody>
</table>


{% endblock %}
